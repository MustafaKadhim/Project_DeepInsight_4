<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Plan | Prostate Radiotherapy Motion-Risk Phenotype</title>
    <meta
      name="description"
      content="Structured, visual project plan viewer with automatic markdown rendering."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="site-header">
      <div class="site-header-inner">
        <p class="eyebrow">Research Project Plan</p>
        <h1 id="page-title">Loading project plan...</h1>
        <p id="page-subtitle" class="subtitle">
          Markdown-connected visual view. Edit one file, update everywhere.
        </p>
        <div class="header-actions">
          <a href="Project_plan.md" class="btn btn-ghost" target="_blank" rel="noopener noreferrer">View Raw Markdown</a>
          <button id="theme-toggle-btn" class="btn btn-ghost" type="button">Switch Theme</button>
          <button id="export-pdf-btn" class="btn btn-ghost" type="button">Download PDF</button>
          <button id="copy-link-btn" class="btn btn-solid" type="button">Copy Share Link</button>
        </div>
      </div>
    </header>

    <main class="layout">
      <aside class="toc-panel">
        <div class="toc-card">
          <h2>Contents</h2>
          <nav id="toc"></nav>
        </div>
        <div class="meta-card">
          <h2>Status</h2>
          <p>Connected source: <strong>Project_plan.md</strong></p>
          <p>Last loaded: <span id="last-loaded">-</span></p>
          <p id="auto-refresh-status" class="auto-refresh-status">Auto refresh: checking...</p>
          <div class="section-controls">
            <button id="expand-all-btn" class="btn btn-ghost btn-small" type="button">Expand All</button>
            <button id="collapse-all-btn" class="btn btn-ghost btn-small" type="button">Collapse All</button>
          </div>
        </div>
      </aside>

      <section class="content-panel">
        <article id="markdown-root" class="markdown-body"></article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
